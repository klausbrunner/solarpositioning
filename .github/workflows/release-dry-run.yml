name: Release Dry Run

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Test version (leave empty for patch bump)'
        required: false
        type: string

jobs:
  dry-run:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Import GPG key (if available)
      continue-on-error: true
      run: |
        if [ -n "$GPG_PRIVATE_KEY" ]; then
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          gpg --list-secret-keys
        else
          echo "No GPG key configured - skipping signing test"
        fi
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        
    - name: Test version bump
      run: |
        echo "Current version: $(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
        if [ -n "${{ github.event.inputs.version }}" ]; then
          mvn versions:set -DnewVersion=${{ github.event.inputs.version }}
          echo "Would set version to: ${{ github.event.inputs.version }}"
        else
          mvn build-helper:parse-version versions:set -DnewVersion=\${parsedVersion.majorVersion}.\${parsedVersion.minorVersion}.\${parsedVersion.nextIncrementalVersion}
          echo "Would bump to: $(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)"
        fi
        mvn versions:commit
        
    - name: Test build and verify
      run: mvn clean verify
        
    - name: Test JReleaser config
      run: mvn jreleaser:config
      env:
        JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        JRELEASER_DRY_RUN: true
        
    - name: Test changelog generation
      run: mvn jreleaser:changelog
      env:
        JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        JRELEASER_DRY_RUN: true
        
    - name: Show what would be released
      run: |
        echo "=== Generated changelog ==="
        if [ -f target/jreleaser/release/CHANGELOG.md ]; then
          cat target/jreleaser/release/CHANGELOG.md
        else
          echo "No changelog found"
        fi