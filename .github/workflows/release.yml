name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (leave empty for patch bump)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Import GPG key
      run: |
        echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
        gpg --list-secret-keys
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
    - name: Release with JReleaser
      run: |
        if [ -n "${{ github.event.inputs.version }}" ]; then
          mvn versions:set -DnewVersion=${{ github.event.inputs.version }}
          mvn versions:commit
        else
          mvn build-helper:parse-version versions:set -DnewVersion=\${parsedVersion.majorVersion}.\${parsedVersion.minorVersion}.\${parsedVersion.nextIncrementalVersion}
          mvn versions:commit
        fi
        mvn clean verify
        mvn jreleaser:full-release
      env:
        JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        JRELEASER_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        JRELEASER_GPG_PUBLIC_KEY: ${{ secrets.GPG_PUBLIC_KEY }}
        JRELEASER_GPG_SECRET_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        JRELEASER_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        JRELEASER_SONATYPE_TOKEN: ${{ secrets.SONATYPE_TOKEN }}