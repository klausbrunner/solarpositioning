name: Publish Snapshot

on:
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
        
    - name: Verify SNAPSHOT version
      run: |
        VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
        if [[ ! "$VERSION" =~ -SNAPSHOT$ ]]; then
          echo "Error: Version $VERSION is not a SNAPSHOT version"
          exit 1
        fi
        echo "Publishing SNAPSHOT version: $VERSION"
        
    - name: Import GPG key
      run: |
        echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
        gpg --list-secret-keys
      env:
        GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        
    - name: Deploy snapshot to Maven Central
      run: mvn clean deploy -Pbasepom.oss-release
      env:
        GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        JRELEASER_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
        JRELEASER_SONATYPE_TOKEN: ${{ secrets.SONATYPE_TOKEN }}